<form>
  <div class="flex shadow rounded-base -space-x-0.5 text-heading dark:text-gray-200 text-sm">
    <select
      [value]="request.methode()"
      class="block px-3 py-2.5 pr-8 bg-neutral-secondary-medium dark:bg-slate-600 border border-default-medium dark:border-slate-800 rounded-s-base placeholder:text-body outline-none"
      id="methode">
      @for (methode of RequestMethodes; track methode) {
        <option [selected]="request.methode() === methode" [value]="methode">{{ methode | titlecase }}</option>
      }
    </select>

    <input
      [value]="request.url()"
      class="px-3 py-2.5 bg-neutral-secondary-medium dark:bg-slate-600 border border-default-medium dark:border-slate-800 block w-full placeholder:text-body focus:outline-none"
      id="url" placeholder="URL" type="search">

    <button
      class="inline-flex items-center bg-blue-700 hover:bg-blue-800 box-border border border-transparent font-medium leading-5 rounded-e-base px-4 py-2.5 focus:outline-none"
      type="button">
      Send
    </button>
  </div>
</form>
